<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Timer</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #efefef;
  color: #111;
  display: flex;
  height: 100vh;
}

.left {
  flex: 2;
  padding: 80px;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
}

.timer {
  font-size: 110px;
  font-weight: 800;
  margin-bottom: 10px;
}

.end {
  font-size: 14px;
  color: #666;
  margin-bottom: 20px;
}

.status {
  font-size: 16px;
  color: #444;
  margin-bottom: 30px;
}

.controls {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.top-row {
  display: flex;
  gap: 16px;
}

.btn {
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.black {
  background: #111;
  color: white;
}

.black:hover {
  background: #000;
}

.blue {
  background: #4f6df5;
  color: white;
}

.blue:hover {
  background: #3c55d1;
}

.time-picker {
  display: inline-flex;
  align-items: center;
  background: #e6e6e6;
  border: 1px solid #bbb;
  padding: 10px 14px;
  border-radius: 6px;
  gap: 12px;
  width: fit-content;
}

.time-picker input[type="time"] {
  border: none;
  background: transparent;
  font-size: 14px;
  outline: none;
  font-family: inherit;
  letter-spacing: 1px;
}

.right {
  flex: 1;
  background: #fff;
  border-left: 1px solid #ddd;
  padding: 80px 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.trivia-title {
  font-size: 13px;
  text-transform: uppercase;
  color: #888;
  margin-bottom: 12px;
  letter-spacing: 1px;
}

.trivia {
  font-size: 20px;
  line-height: 1.5;
}

#videoOverlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.video-box {
  position: relative;
}

.close-btn {
  position: absolute;
  top: -40px;
  right: 0;
  background: white;
  border: none;
  padding: 8px 12px;
  cursor: pointer;
  border-radius: 6px;
  font-size: 18px;
}

</style>
</head>

<body>

<div class="left">
  <div id="timer" class="timer">--:--:--</div>
  <div id="end" class="end">Target Logout: --</div>
  <div id="status" class="status"></div>

  <div class="controls">
    <div class="top-row">
      <button class="btn black" onclick="startDefault()">Start 93%</button>
      <button class="btn blue" onclick="startAtClock()">Start at Clock Time</button>
    </div>

    <div class="time-picker">
      <input id="clockTime" type="time">
      <span>🕒</span>
    </div>
  </div>
</div>

<div class="right">
  <div class="trivia-title">Did you know</div>
  <div id="trivia" class="trivia"></div>
</div>

<audio id="alarm" preload="auto">
  <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg">
</audio>

<script>
const SHIFT_SECONDS = Math.floor(9 * 3600 * 0.93);
let endTime = null;
let alertTriggered = false;

const timer = document.getElementById("timer");
const end = document.getElementById("end");
const alarm = document.getElementById("alarm");
const trivia = document.getElementById("trivia");
const status = document.getElementById("status");

const triviaList = [
  "Brain consumes ~20% of total body energy.",
  "Octopus has three hearts.",
  "Venus day is longer than its year.",
  "Honey never spoils.",
  "Sharks existed before trees.",
  "Bananas are radioactive.",
  "ISS is visible from Earth.",
  "You blink ~20,000 times a day."
];

function format(ms) {
  const s = Math.max(0, Math.floor(ms / 1000));
  const h = String(Math.floor(s / 3600)).padStart(2,'0');
  const m = String(Math.floor((s % 3600)/60)).padStart(2,'0');
  const sec = String(s % 60).padStart(2,'0');
  return `${h}:${m}:${sec}`;
}

function startDefault() {
  endTime = Date.now() + SHIFT_SECONDS * 1000;
  alertTriggered = false;
  save();
  updateEnd();
  update();
}

function startAtClock() {
  const val = document.getElementById("clockTime").value;
  if (!val) return;

  const [hh, mm] = val.split(":").map(Number);

  const shiftStart = new Date();
  shiftStart.setHours(hh, mm, 0, 0);

  endTime = shiftStart.getTime() + SHIFT_SECONDS * 1000;
  alertTriggered = false;

  save();
  updateEnd();
  update();
}

function update() {
  if (!endTime) return;

  const remaining = endTime - Date.now();
  timer.textContent = format(remaining);

  const shiftStart = endTime - SHIFT_SECONDS * 1000;
  const now = Date.now();

  if (now < shiftStart) {
    status.textContent = "Forecast Mode";
  } else if (remaining > 0) {
    status.textContent = "Shift in Progress";
  } else {
    status.textContent = "93% Complete — Logout Time Reached";
  }

	if (remaining <= 11000 && remaining > 0 && !alertTriggered) {
	alertTriggered = true;

	alarm.play().catch(() => {});

	try {
		showVideo();
	} catch(e) {
		console.log(e);
	}
	}

  if (remaining <= 0) {
    finish();
  }
}

function updateEnd() {
  end.textContent = "Target Logout: " + new Date(endTime).toLocaleString();
}

function finish() {
  timer.textContent = "00:00:00";
  localStorage.removeItem("endTime");
}

function rotateTrivia() {
  trivia.textContent =
    triviaList[Math.floor(Math.random() * triviaList.length)];
}

function save() {
  localStorage.setItem("endTime", endTime);
}

function restore() {
  const saved = localStorage.getItem("endTime");
  if (saved) {
    endTime = +saved;
    updateEnd();
    update();
  }
}

restore();
rotateTrivia();

setInterval(update, 1000);
setInterval(rotateTrivia, 15000);

function showVideo() {
  document.getElementById("videoOverlay").style.display = "flex";

  document.getElementById("ytFrame").src =
    "https://www.youtube.com/embed/9tqLpywgN-A?autoplay=1";
}

function closeVideo() {
  document.getElementById("videoOverlay").style.display = "none";
  document.getElementById("ytFrame").src = "";
}
</script>

<div id="videoOverlay">
  <div class="video-box">
    <button onclick="closeVideo()" class="close-btn">✕</button>

    <iframe
      id="ytFrame"
      width="900"
      height="506"
      src=""
      title="YouTube video player"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen>
    </iframe>
  </div>
</div>

</body>
</html>
